<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UGOCHUKWU | Portfolio</title>
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/home.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="home-page">

  <!-- ============================================
       NAVIGATION - Transparent, no border-bottom
       ============================================ -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">UGOCHUKWU</a>
      
      <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="skill.html">Skill</a></li>
        <li><a href="project.html">Project</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- ============================================
       HERO - 100% viewport, no scroll, no image
       ============================================ -->
  <main class="hero">
    <div class="container">
      <div class="hero-content">
        <div class="section-indicator">
          <span class="number">/ 01</span>
          <span class="line"></span>
        </div>
        
        <p class="hero-label">Portfolio Collection</p>
        
        <h1 class="hero-title">My<br>Portfolio</h1>
        
        <p class="hero-desc">
          Introducing my portfolio, a collection of <em>minimalist and modern web experiences</em> specifically crafted for the digital landscape.
        </p>
        
        <a href="project.html" class="hero-cta">View Projects</a>
      </div>
    </div>
  </main>

  <!-- ============================================
       MOBILE MENU SCRIPT
       ============================================ -->
  <script>
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    
    menuToggle.addEventListener('click', () => {
      navLinks.classList.toggle('active');
    });
    
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('active');
      });
    });
  </script>
</body>
</html>
